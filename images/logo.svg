<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="100" height="100">
  <!-- Background -->
  <rect width="100" height="100" fill="#1a4f55" rx="10"/>
  
  <!-- Branch/vine element -->
  <g stroke="#d4af37" stroke-width="2" fill="none" stroke-linecap="round">
    <!-- Main stem -->
    <path d="M 50 10 Q 48 30, 50 50 Q 52 70, 50 90" />
    
    <!-- Left branches -->
    <path d="M 45 25 L 30 20" />
    <path d="M 42 40 L 25 35" />
    <path d="M 44 60 L 30 65" />
    <path d="M 47 75 L 35 82" />
    
    <!-- Right branches -->
    <path d="M 55 25 L 70 20" />
    <path d="M 58 40 L 75 35" />
    <path d="M 56 60 L 70 65" />
    <path d="M 53 75 L 65 82" />
  </g>
  
  <!-- Small decorative circles at branch ends -->
  <circle cx="30" cy="20" r="1.5" fill="#d4af37" opacity="0.7"/>
  <circle cx="70" cy="20" r="1.5" fill="#d4af37" opacity="0.7"/>
  <circle cx="25" cy="35" r="1.5" fill="#d4af37" opacity="0.7"/>
  <circle cx="75" cy="35" r="1.5" fill="#d4af37" opacity="0.7"/>
</svg>
