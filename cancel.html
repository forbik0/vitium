<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.vitium.art;">
    <title>Vitium | Zrušení rezervace</title>
    <link rel="stylesheet" href="css/style.css"> <style>
        .cancel-container {
            max-width: 500px;
            margin: 100px auto;
            padding: 40px;
            text-align: center;
            background: var(--color-primary);
            color: var(--color-light);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .cancel-container h2 {
            margin-bottom: 20px;
            font-size: 1.8rem;
            color: var(--color-secondary);
        }
        .btn-confirm-cancel {
            background-color: #e63946;
            color: var(--color-light);
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-confirm-cancel:hover { transform: scale(1.05); }
        .btn-confirm-cancel:disabled { background-color: #ccc; cursor: not-allowed; }
        #status-msg { margin-top: 20px; font-weight: 600; }
        .success { color: #2e7d32; }
        .error { color: #c62828; }
    </style>
</head>
<body>

    <div class="cancel-container">
        <h2>Zrušení rezervace</h2>
        <p id="info-text">Opravdu si přejete zrušit svou rezervaci na představení?</p>
        
        <button id="cancel-btn" class="btn-confirm-cancel">Potvrdit zrušení</button>
        
        <div id="status-msg"></div>
        <div style="margin-top: 30px;">
            <a href="index.html">← Zpět na hlavní stránku</a>
        </div>
    </div>
    <script src="js/config.js?ver=1.1.0"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const hash = urlParams.get('hash'); // Očekává URL ve tvaru cancel.html?hash=XYZ
            const btn = document.getElementById('cancel-btn');
            const status = document.getElementById('status-msg');

            if (!hash) {
                status.textContent = "Chybí identifikační kód rezervace.";
                status.className = "error";
                btn.style.display = "none";
                return;
            }

            btn.addEventListener('click', async () => {
                btn.disabled = true;
                btn.textContent = "Ruším...";

                try {
                    const response = await fetch(`${CONFIG.API_PUBLIC_URL}/cancel/${hash}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' }
                    });

                    const result = await response.json();

                    if (response.ok) {
                        status.textContent = result.message || "Rezervace byla úspěšně zrušena.";
                        status.className = "success";
                        btn.style.display = "none";
                        document.getElementById('info-text').style.display = "none";
                    } else {
                        throw new Error(result.error || "Rezervaci se nepodařilo zrušit.");
                    }
                } catch (error) {
                    status.textContent = error.message;
                    status.className = "error";
                    btn.disabled = false;
                    btn.textContent = "Zkusit znovu";
                }
            });
        });
    </script>
</body>
</html>
